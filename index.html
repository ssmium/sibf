<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SIBF 2026 부스 네비게이터</title>
<style>
:root {
  --yellow: #FFD600;
  --dark: #1a1a1a;
  --blue: #4A90E2;
  --red: #E74C3C;
  --green: #2ECC71;
  --radius: 16px;
  --sheet-peek: 0px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #eee; }

/* ── 상단 검색바 ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--dark);
  padding: env(safe-area-inset-top, 0) 12px 0;
}
.topbar-inner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0;
}
.topbar h1 { font-size: 13px; font-weight: 700; color: var(--yellow); white-space: nowrap; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 32px;
  background: rgba(255,255,255,.12); border: none; border-radius: 20px;
  color: #fff; font-size: 13px; outline: none;
}
.search-wrap input::placeholder { color: rgba(255,255,255,.4); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .5; }
.search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,.5); font-size: 18px; cursor: pointer; display: none; padding: 0; }

/* 검색 결과 드롭다운 */
.search-results {
  position: fixed; top: 60px; left: 12px; right: 12px; z-index: 200;
  background: #fff; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  max-height: 50vh; overflow-y: auto;
  display: none;
}
.search-results.show { display: block; }
.sr-item {
  padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:active { background: #f5f5f5; }
.sr-bid { font-size: 10px; font-weight: 700; background: var(--dark); color: var(--yellow); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.sr-name { font-size: 13px; color: #333; }
.sr-hall { font-size: 10px; color: #aaa; }

/* ── 지도 영역 ── */
.map-area {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden; touch-action: none;
}
svg#map { display: block; transform-origin: 0 0; will-change: transform; }

/* ── 하단 플로팅 버튼들 ── */
.fab-group {
  position: fixed; right: 16px; z-index: 90;
  display: flex; flex-direction: column; gap: 10px;
  transition: bottom 0.35s cubic-bezier(.4,0,.2,1);
  bottom: 74px;
}
.fab {
  width: 48px; height: 48px; border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 16px rgba(0,0,0,.18);
  transition: transform .15s;
}
.fab:active { transform: scale(.92); }
.fab-reset { background: #fff; color: var(--dark); }
.fab-wish { background: var(--yellow); color: var(--dark); font-size: 16px; font-weight: 700; position: relative; }
.fab-wish .badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 700;
  min-width: 18px; height: 18px; border-radius: 9px;
  display: none; align-items: center; justify-content: center;
  padding: 0 4px;
}
.fab-wish .badge.show { display: flex; }

/* ── 하단 시트 ── */
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 80;
  background: #fff;
  border-radius: var(--radius) var(--radius) 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,.12);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  will-change: transform;
  height: 72vh;
  max-height: 85vh;
  min-height: 320px;
  display: flex; flex-direction: column;
}
.sheet-handle {
  width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
/* 탭 */
.sheet-tabs {
  display: flex; border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0; padding: 0 16px;
}
.stab {
  flex: 1; padding: 12px 0; font-size: 12px; font-weight: 600;
  text-align: center; color: #bbb; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .15s;
}
.stab.active { color: var(--dark); border-bottom-color: var(--yellow); }

/* 시트 콘텐츠 */
.sheet-body { flex: 1; overflow-y: auto; overscroll-behavior: contain; }

/* 부스 리스트 */
.booth-list-wrap { padding: 4px 0; }
.bli {
  padding: 12px 16px; border-bottom: 1px solid #f8f8f8;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.bli:active { background: #f5f5f5; }
.bli.sel { background: #FFFBE6; }
.bli-badge { font-size: 9px; font-weight: 700; background: var(--dark); color: var(--yellow); padding: 3px 6px; border-radius: 4px; flex-shrink: 0; min-width: 44px; text-align: center; }
.bli-info { flex: 1; min-width: 0; }
.bli-name { font-size: 13px; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bli-hall { font-size: 10px; color: #bbb; margin-top: 1px; }
.bli-check { font-size: 18px; color: var(--yellow); flex-shrink: 0; opacity: 0; transition: opacity .15s; }
.bli.sel .bli-check { opacity: 1; }

/* 찜 목록 */
.wish-wrap { padding: 12px 16px; }
.wish-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; line-height: 2; }
.wi-item {
  background: #fafafa; border: 1px solid #eee; border-radius: 10px;
  padding: 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.wi-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--yellow); color: var(--dark);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.wi-info { flex: 1; min-width: 0; }
.wi-id { font-size: 11px; font-weight: 700; color: #333; }
.wi-name { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wi-del { background: none; border: none; font-size: 22px; color: #ddd; cursor: pointer; padding: 0 2px; }
.wi-del:active { color: var(--red); }

/* 경로 결과 */
.route-result {
  background: var(--yellow); border-radius: 10px;
  padding: 12px 14px; margin: 12px 16px;
  display: none;
}
.route-result.show { display: block; }
.rr-stops { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 6px; }
.rr-badge { font-size: 9px; font-weight: 700; background: var(--dark); color: var(--yellow); padding: 2px 6px; border-radius: 3px; }
.rr-arrow { font-size: 10px; color: var(--dark); }
.rr-meta { font-size: 11px; color: #333; font-weight: 600; }

/* 하단 고정 버튼 */
.sheet-footer {
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
  border-top: 1px solid #f0f0f0;
  display: flex; gap: 8px; flex-shrink: 0;
}
.btn-calc {
  flex: 1; padding: 14px; background: var(--dark); color: var(--yellow);
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-calc:active { background: #333; }
.btn-clr {
  padding: 14px 16px; background: #f5f5f5; color: #666;
  border: 1px solid #eee; border-radius: 10px; font-size: 13px; cursor: pointer;
  white-space: nowrap;
}

/* 툴팁 (탭 후 나타나는 부스 정보) */
.btip {
  position: fixed; z-index: 110;
  background: var(--dark); color: #fff;
  padding: 8px 12px; border-radius: 10px;
  font-size: 12px; line-height: 1.6;
  pointer-events: none; display: none;
  max-width: 200px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
}

/* 하단 시트 열기 버튼 */
.sheet-toggle {
  position: fixed;
  left: 50%;
  bottom: calc(12px + env(safe-area-inset-bottom, 0));
  transform: translateX(-50%);
  z-index: 95;
  padding: 10px 16px;
  border: none;
  border-radius: 999px;
  background: var(--dark);
  color: var(--yellow);
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: bottom 0.35s cubic-bezier(.4,0,.2,1), background .2s, color .2s, transform .2s;
}
.sheet-toggle.is-open {
  background: #fff;
  color: var(--dark);
}

/* 시트 숨김 / open 상태 */
.sheet { transform: translateY(100%); }
.sheet.half { transform: translateY(calc(100% - 42vh)); }
.sheet.open { transform: translateY(0); }
@media (max-height: 700px) {
  .sheet.half { transform: translateY(calc(100% - 300px)); }
}

/* topbar 높이 보정 */
.topbar-spacer { height: 60px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- 상단 검색바 -->
<div class="topbar">
  <div class="topbar-inner">
    <h1>📚 SIBF 2026</h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="si" type="text" placeholder="출판사명 · 부스번호" autocomplete="off" oninput="onSearch()">
      <button class="search-clear" id="sc" onclick="clearSearch()">×</button>
    </div>
  </div>
</div>

<!-- 검색 결과 드롭다운 -->
<div class="search-results" id="sr"></div>

<!-- 지도 -->
<div class="map-area" id="ma">
  <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="btip" id="btip"></div>
</div>

<!-- FAB 버튼 -->
<div class="fab-group" id="fabGroup">
  <button class="fab fab-reset" onclick="resetView()" title="전체 보기">⊙</button>
  <button class="fab fab-wish" onclick="openWishTab()" title="내 코스">
    ⭐
    <span class="badge" id="wbadge"></span>
  </button>
</div>

<!-- 하단 시트 열기 버튼 -->
<button class="sheet-toggle" id="sheetToggle" onclick="toggleSheet()">▲ 부스 목록 열기</button>

<!-- 하단 시트 -->
<div class="sheet" id="sheet">
  <div class="sheet-handle" id="sheetHandle"></div>
  <div class="sheet-tabs">
    <div class="stab active" id="tabL" onclick="switchTab('list')">📋 전체 부스</div>
    <div class="stab" id="tabW" onclick="switchTab('wish')">⭐ 내 코스</div>
  </div>

  <!-- 전체 부스 -->
  <div class="sheet-body" id="listBody" style="display:block">
    <div class="booth-list-wrap" id="bl"></div>
  </div>

  <!-- 내 코스 -->
  <div class="sheet-body" id="wishBody" style="display:none">
    <div class="route-result" id="rr">
      <div class="rr-stops" id="rrStops"></div>
      <div class="rr-meta" id="rrMeta"></div>
    </div>
    <div class="wish-wrap" id="wi"></div>
  </div>

  <div class="sheet-footer" id="sf" style="display:none">
    <button class="btn-calc" onclick="calcRoute()">🗺️ 최적 동선 계산</button>
    <button class="btn-clr" onclick="clearWish()">초기화</button>
  </div>
</div>

  try{
    const state={
      wishlist:wishlist.map(w=>w.id),
      routeOrder,
      view:{sc,tx,ty},
      sheetMode:currentSheetMode(),
      tab:currentTab()
    };
    localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  }catch(e){}
}
function saveState(){
  if(isRestoring)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveStateNow,120);
}
function restoreState(){
  let state=null;
  try{state=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');}catch(e){state=null;}
  if(!state)return false;
  isRestoring=true;
  try{
    const ids=Array.isArray(state.wishlist)?state.wishlist.filter(id=>bmap[id]):[];
    wishlist=ids.map(id=>({id}));
    routeOrder=Array.isArray(state.routeOrder)?state.routeOrder.filter(id=>bmap[id]&&ids.includes(id)):[];

    wishlist.forEach(w=>setBColor(w.id,'#FFD600'));
    if(routeOrder.length>=2){
      drawRoute(routeOrder);
      routeSummary(routeOrder);
    }else{
      routeOrder=[];
      document.getElementById('rl').innerHTML='';
      document.getElementById('rr').classList.remove('show');
    }

    if(state.view&&Number.isFinite(state.view.sc)&&Number.isFinite(state.view.tx)&&Number.isFinite(state.view.ty)){
      sc=state.view.sc;tx=state.view.tx;ty=state.view.ty;applyT();

    setTabState(state.tab==='wish'?'wish':'list');
    setSheetState(['open','half','closed'].includes(state.sheetMode)?state.sheetMode:'closed');
  }finally{
    isRestoring=false;
  }
  return true;
}

// ── 복도 경로 ──
function nearX(x){return CX.reduce((a,b)=>Math.abs(b-x)<Math.abs(a-x)?b:a);}
function nearY(y){return CY.reduce((a,b)=>Math.abs(b-y)<Math.abs(a-y)?b:a);}

function exitPoint(b){
  const L={x:nearX(b.x-1),    y:b.cy,d:Math.abs(nearX(b.x-1)-b.x)};
  const R={x:nearX(b.x+b.w+1),y:b.cy,d:Math.abs(nearX(b.x+b.w+1)-(b.x+b.w))};
  const T={x:b.cx,y:nearY(b.y-1),    d:Math.abs(nearY(b.y-1)-b.y)};
  const B={x:b.cx,y:nearY(b.y+b.h+1),d:Math.abs(nearY(b.y+b.h+1)-(b.y+b.h))};
  return [L,R,T,B].sort((a,b)=>a.d-b.d)[0];
}

function corridorPath(from,to){
  const ep1=exitPoint(from),ep2=exitPoint(to);
  const fcx=nearX(ep1.x),fcy=nearY(ep1.y);
  const tcx=nearX(ep2.x),tcy=nearY(ep2.y);
  const pts=[[from.cx,from.cy],[ep1.x,ep1.y],[fcx,ep1.y],[fcx,fcy]];
  if(Math.abs(fcx-tcx)>10)pts.push([tcx,fcy]);
  if(Math.abs(fcy-tcy)>10)pts.push([tcx,tcy]);
  pts.push([ep2.x,tcy],[ep2.x,ep2.y],[to.cx,to.cy]);
  const r=[pts[0]];
  for(let i=1;i<pts.length;i++){const p=r[r.length-1];if(Math.abs(p[0]-pts[i][0])>3||Math.abs(p[1]-pts[i][1])>3)r.push(pts[i]);}
  return r;
}

function plen(pts){let d=0;for(let i=1;i<pts.length;i++)d+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);return d;}
function bDist(a,b){return plen(corridorPath(bmap[a],bmap[b]));}

function optimizeRoute(ids){
  if(ids.length<=2)return[...ids];
  const uv=new Set(ids.slice(1));const res=[ids[0]];let cur=ids[0];
  while(uv.size>0){let best=null,bd=1e9;for(const id of uv){const d=bDist(cur,id);if(d<bd){bd=d;best=id;}}res.push(best);uv.delete(best);cur=best;}
  return res;
}

function buildMap(){

  mapEl.setAttribute('width',W);mapEl.setAttribute('height',H);
  mapEl.setAttribute('viewBox',`${-PAD} ${-PAD} ${W} ${H}`);
  mapEl.appendChild(mk('rect',{x:-PAD,y:-PAD,width:W,height:H,fill:'#ededea'}));
  // Hall 배경
  [[120,1850,2800,1450],[120,3300,2800,450]].forEach(([x,y,w,h])=>
    mapEl.appendChild(mk('rect',{x,y,width:w,height:h,fill:'#fff',stroke:'#ddd','stroke-width':3,rx:8})));
  mapEl.appendChild(mk('rect',{x:1180,y:410,width:1760,height:1430,fill:'#fff',stroke:'#ddd','stroke-width':3,rx:8}));
  // Hall 레이블
  [['Hall A',160,1910],['Hall B',1220,470]].forEach(([t,x,y])=>{
    const el=mk('text',{x,y,fill:'#d0d0d0','font-size':56,'font-weight':800,'font-family':'sans-serif'});el.textContent=t;mapEl.appendChild(el);});
  // 입구/출구
  const gates=[
    {x:1800,y:3580,t:'🚪 Hall A 입구',c:'#2ECC71'},
    {x:550, y:3580,t:'🚪 Hall A 출구',c:'#E74C3C'},
    {x:2920,y:1050,t:'🚪 B1홀 출입구',c:'#3498DB'},
    {x:1480,y:1870,t:'A↔B 연결',c:'#F39C12'},
  ];
  gates.forEach(g=>{
    mapEl.appendChild(mk('rect',{x:g.x-105,y:g.y-22,width:210,height:44,fill:g.c,rx:22,opacity:.9}));
    const t=mk('text',{x:g.x,y:g.y+7,'text-anchor':'middle','font-size':20,fill:'#fff','font-weight':700,'font-family':'sans-serif','pointer-events':'none'});
    t.textContent=g.t;mapEl.appendChild(t);
  });
  // 경로 레이어
  mapEl.appendChild(mk('g',{id:'rl'}));
  // 부스
  BR.forEach(b=>{
    if(b.h<35)return;
    const g=mk('g',{id:'b_'+b.id});g.style.cursor='pointer';
    g.addEventListener('click',e=>{e.stopPropagation();onBClick(b.id,e);});
    const r=mk('rect',{x:b.x,y:b.y,width:b.w,height:b.h,fill:'#DADADA',stroke:'#bbb','stroke-width':1.5,rx:3});
    g.appendChild(r);
    const ms=Math.min(b.w,b.h);
    if(ms>=20){
      const names=DIR[b.id]||[];
      const idFs=Math.max(8,Math.min(ms*.18,16));
      const idY=names.length>0?b.cy-ms*.08:b.cy+idFs*.38;
      const tid=mk('text',{x:b.cx,y:idY,'font-size':idFs,'text-anchor':'middle',fill:'#444','font-family':'sans-serif','font-weight':700,'pointer-events':'none'});
      tid.textContent=b.id;g.appendChild(tid);
      if(names.length>0&&ms>=40){
        const nfs=Math.max(7,Math.min(ms*.13,13));
        const mc=Math.floor((b.w-8)/(nfs*.6));
        const nm=names[0];
        const tn=mk('text',{x:b.cx,y:b.cy+ms*.18,'font-size':nfs,'text-anchor':'middle',fill:'#666','font-family':'sans-serif','pointer-events':'none'});
        tn.textContent=nm.length>mc?nm.slice(0,mc-1)+'…':nm;g.appendChild(tn);
      }
    }
    mapEl.appendChild(g);
  });
  resetView();
}

function addWish(id){if(wishlist.find(w=>w.id===id))return;wishlist.push({id});setBColor(id,'#FFD600');renderWish();renderList();updateBadge();saveState();}
function removeWish(id){wishlist=wishlist.filter(w=>w.id!==id);setBColor(id,'#DADADA');if(routeOrder.length)clearRoute();renderWish();renderList();updateBadge();saveState();}
function clearWish(){wishlist.forEach(w=>setBColor(w.id,'#DADADA'));wishlist=[];clearRoute();renderWish();renderList();updateBadge();saveState();}
function updateBadge(){
  const b=document.getElementById('wbadge');
  const n=wishlist.length;
  b.textContent=n;b.classList.toggle('show',n>0);
}

function renderWish(){
  const c=document.getElementById('wi');
  document.getElementById('sf').style.display=wishlist.length>0?'flex':'none';
  if(!wishlist.length){c.innerHTML='<div class="wish-empty">⭐ 전체 부스 탭에서<br>가고 싶은 부스를 눌러보세요!</div>';return;}
  const ord=routeOrder.length>0?routeOrder:wishlist.map(w=>w.id);
  c.innerHTML=ord.map((id,i)=>{const n=(DIR[id]||[])[0]||'—';return`<div class="wi-item"><div class="wi-num">${i+1}</div><div class="wi-info"><div class="wi-id">${id}</div><div class="wi-name">${n}</div></div><button class="wi-del" onclick="removeWish('${id}')">×</button></div>`;}).join('');
}

function renderList(q=''){
  const c=document.getElementById('bl');
  const items=BR.filter(b=>b.h>=35).filter(b=>{if(!q)return true;const n=DIR[b.id]||[];return b.id.toLowerCase().includes(q)||n.some(x=>x.toLowerCase().includes(q));});
  c.innerHTML=items.map(b=>{
    const n=DIR[b.id]||[];const hall=b.id.startsWith('A')?'Hall A':'Hall B';const sel=!!wishlist.find(w=>w.id===b.id);
    return`<div class="bli${sel?' sel':''}" onclick="onBClick('${b.id}');renderList(document.getElementById('si').value.toLowerCase())">
      <span class="bli-badge">${b.id}</span>
      <div class="bli-info"><div class="bli-name">${n.slice(0,2).join(' · ')||'—'}</div><div class="bli-hall">${hall}</div></div>
      <span class="bli-check">✓</span>
    </div>`;
  }).join('');
}

// ── 검색 ──
function onSearch(){
  const q=document.getElementById('si').value;
  document.getElementById('sc').style.display=q?'block':'none';
  if(!q){document.getElementById('sr').classList.remove('show');return;}
  const items=BR.filter(b=>b.h>=35).filter(b=>{const n=DIR[b.id]||[];return b.id.toLowerCase().includes(q.toLowerCase())||n.some(x=>x.toLowerCase().includes(q.toLowerCase()));}).slice(0,8);
  const sr=document.getElementById('sr');
  if(!items.length){sr.classList.remove('show');return;}
  sr.innerHTML=items.map(b=>{const n=DIR[b.id]||[];const hall=b.id.startsWith('A')?'Hall A':'Hall B';
    return`<div class="sr-item" onclick="selectBooth('${b.id}')"><span class="sr-bid">${b.id}</span><div><div class="sr-name">${n[0]||'—'}</div><div class="sr-hall">${hall}</div></div></div>`;
  }).join('');
  sr.classList.add('show');
}

function selectBooth(id){
  clearSearch();
  const b=bmap[id];if(!b)return;
  // 지도에서 부스로 이동
  const ww=ma.clientWidth,wh=ma.clientHeight;
  const targetSc=Math.min(ww/400,wh/400,3);
  tx=ww/2-b.cx*targetSc; ty=wh/2-b.cy*targetSc; sc=targetSc;
  applyT();
  // 하이라이트 잠깐
  const g=document.getElementById('b_'+id);
  if(g){const r=g.querySelector('rect');if(r){r.setAttribute('fill','#FFF176');setTimeout(()=>setBColor(id,wishlist.find(w=>w.id===id)?'#FFD600':'#DADADA'),1200);}}
  collapseSheet();
}

function clearSearch(){
  document.getElementById('si').value='';
  document.getElementById('sc').style.display='none';
  document.getElementById('sr').classList.remove('show');
}

// ── 최적 경로 ──
function calcRoute(){
  if(wishlist.length<2){alert('부스를 2개 이상 선택해주세요!');return;}
  routeOrder=optimizeRoute(wishlist.map(w=>w.id));
  drawRoute(routeOrder);renderWish();showRouteResult(routeOrder);
}

function drawRoute(ids){
  const rl=document.getElementById('rl');rl.innerHTML='';
  for(let i=0;i<ids.length-1;i++){
    const f=bmap[ids[i]],t=bmap[ids[i+1]];
    const pts=corridorPath(f,t);
    const ps=pts.map(p=>p.join(',')).join(' ');
    rl.appendChild(mk('polyline',{points:ps,fill:'none',stroke:'rgba(0,0,0,.07)','stroke-width':18,'stroke-linecap':'round','stroke-linejoin':'round'}));
    rl.appendChild(mk('polyline',{points:ps,fill:'none',stroke:'#FFD600','stroke-width':10,'stroke-linecap':'round','stroke-linejoin':'round',opacity:.93}));
  }
  ids.forEach((id,i)=>{
    const b=bmap[id];
    const isF=i===0,isL=i===ids.length-1;
    const col=isF?'#4A90E2':isL?'#E74C3C':'#2ECC71';
    const lbl=isF?'S':isL?'E':String(i+1);
    rl.appendChild(mk('circle',{cx:b.cx,cy:b.cy,r:30,fill:'white',stroke:col,'stroke-width':4}));
    rl.appendChild(mk('circle',{cx:b.cx,cy:b.cy,r:22,fill:col}));
    const t=mk('text',{x:b.cx,y:b.cy+6,'text-anchor':'middle','font-size':16,fill:'#fff','font-weight':900,'font-family':'sans-serif','pointer-events':'none'});
    t.textContent=lbl;rl.appendChild(t);
    const nm=(DIR[id]||[])[0]||id;
    const labelY=b.cy>1800?b.y-22:b.y+b.h+30;
    rl.appendChild(mk('rect',{x:b.cx-75,y:labelY-17,width:150,height:22,fill:col,rx:4,opacity:.92}));
    const tl=mk('text',{x:b.cx,y:labelY-2,'text-anchor':'middle','font-size':12,fill:'#fff','font-weight':700,'font-family':'sans-serif','pointer-events':'none'});
    tl.textContent=`${i+1}. ${nm.length>10?nm.slice(0,10)+'…':nm}`;rl.appendChild(tl);
    setBColor(id,col);
  });
  fitRoute(ids);
}

function showRouteResult(ids){
  routeSummary(ids);
  openSheet();
  saveState();
}

function clearRoute(){
  routeOrder=[];document.getElementById('rl').innerHTML='';
  document.getElementById('rr').classList.remove('show');
  wishlist.forEach(w=>setBColor(w.id,'#FFD600'));renderWish();saveState();
}

// ── 탭 전환 ──
function switchTab(t){
  setTabState(t);
  openSheet();
  saveState();
}
function openWishTab(){
  setTabState('wish');
  openSheet();
  saveState();
}

// ── 시트 동작 ──
function isSheetVisible(){return sheet.classList.contains('open')||sheet.classList.contains('half');}
function visibleSheetHeight(){
  if(sheet.classList.contains('open')) return Math.min(sheet.offsetHeight||window.innerHeight*.72, window.innerHeight-72);
  if(sheet.classList.contains('half')) return Math.min(window.innerHeight*.42, sheet.offsetHeight||window.innerHeight*.42);
  return 0;
}
function updateSheetToggle(){
  const t=document.getElementById('sheetToggle');
  if(!t)return;
  const visible=isSheetVisible();
  t.classList.toggle('is-open',visible);
  t.textContent=visible?'▼ 부스 목록 닫기':'▲ 부스 목록 열기';

  // 닫힘: 화면 맨 아래 / 열림: 실제로 보이는 시트 바로 위
  const h=visibleSheetHeight();
  t.style.bottom=h?`${Math.max(12,Math.min(window.innerHeight-66,h+12))}px`:'calc(12px + env(safe-area-inset-bottom, 0))';
}
function toggleSheet(){
  if(isSheetVisible()) collapseSheet();
  else openSheet();
  saveState();
}
function openSheet(){
  sheet.classList.add('half');
  sheet.classList.remove('open');
  sheetOpen=true;
  updateFabBottom();
  saveState();
}
function collapseSheet(){
  sheet.classList.remove('open','half');
  sheetOpen=false;
  updateFabBottom();
  saveState();
}
function updateFabBottom(){
  const h=visibleSheetHeight();
  const bottom=h?Math.max(74,Math.min(window.innerHeight-66,h+16)):74;
  document.getElementById('fabGroup').style.bottom=bottom+'px';
  updateSheetToggle();
}

// 시트 드래그
let sheetDragY=0,sheetDragging=false,sheetStartY=0;
const handle=document.getElementById('sheetHandle');
handle.addEventListener('touchstart',e=>{sheetDragging=true;sheetStartY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!sheetDragging)return;
  const dy=e.touches[0].clientY-sheetStartY;
  if(dy<-40){sheet.classList.add('open');sheet.classList.remove('half');}
  else if(dy>40){sheet.classList.remove('open');if(dy>120)sheet.classList.remove('half');else sheet.classList.add('half');}
  sheetOpen=isSheetVisible();
  updateFabBottom();
  saveState();
},{passive:true});
window.addEventListener('touchend',()=>{sheetDragging=false;});
// 탭/핸들 클릭으로 토글
handle.addEventListener('click',()=>{
  if(sheet.classList.contains('open')){sheet.classList.remove('open');sheet.classList.add('half');}
  else if(sheet.classList.contains('half')){sheet.classList.add('open');sheet.classList.remove('half');}
  else{sheet.classList.add('half');}
  sheetOpen=isSheetVisible();
  updateFabBottom();
  saveState();
});

// ── 지도 제어 ──
function applyT(){mapEl.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;saveState();}
function resetView(){
  const ww=ma.clientWidth,wh=ma.clientHeight,sw=SW+PAD*2,sh=SH+PAD*2;
  sc=Math.min(ww/sw,wh/sh)*.95;tx=(ww-sw*sc)/2;ty=(wh-sh*sc)/2;applyT();saveState();
}
function zoom(f){
  const ww=ma.clientWidth,wh=ma.clientHeight,cx=ww/2,cy=wh/2;
  const ns=Math.max(.05,Math.min(sc*f,6));
  tx=cx-(cx-tx)*(ns/sc);ty=cy-(cy-ty)*(ns/sc);sc=ns;applyT();
}
function fitRoute(ids){
  const bs=ids.map(id=>bmap[id]).filter(Boolean);
  const xs=bs.map(b=>b.x),ys=bs.map(b=>b.y);const p=350;
  const minX=Math.min(...xs)-p,maxX=Math.max(...xs.map((x,i)=>x+bs[i].w))+p;
  const minY=Math.min(...ys)-p,maxY=Math.max(...ys.map((y,i)=>y+bs[i].h))+p;
  const ww=ma.clientWidth,wh=ma.clientHeight;
  const ns=Math.min(ww/(maxX-minX),wh/(maxY-minY),2)*.82;
  tx=ww/2-(minX+maxX)/2*ns;ty=wh/2-(minY+maxY)/2*ns;sc=ns;applyT();saveState();
}

// 터치 제스처 (드래그+핀치줌)
let touches=[];
ma.addEventListener('touchstart',e=>{
  if(e.target.closest('#sheet'))return;
  touches=Array.from(e.touches);
},{passive:true});
ma.addEventListener('touchmove',e=>{
  if(e.target.closest('#sheet'))return;
  e.preventDefault();
  const ct=Array.from(e.touches);
  if(ct.length===1&&touches.length===1){
    tx+=ct[0].clientX-touches[0].clientX;
    ty+=ct[0].clientY-touches[0].clientY;
  } else if(ct.length===2&&touches.length===2){
    const od=Math.hypot(touches[1].clientX-touches[0].clientX,touches[1].clientY-touches[0].clientY);
    const nd=Math.hypot(ct[1].clientX-ct[0].clientX,ct[1].clientY-ct[0].clientY);
    const mx=(ct[0].clientX+ct[1].clientX)/2,my=(ct[0].clientY+ct[1].clientY)/2;
    const f=nd/od,ns=Math.max(.05,Math.min(sc*f,6));
    tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;
  }
  touches=ct;applyT();
},{passive:false});
ma.addEventListener('touchend',e=>{touches=Array.from(e.touches);},{passive:true});

// 마우스 드래그
let mdrag=false,mlx,mly;
ma.addEventListener('mousedown',e=>{mdrag=true;mlx=e.clientX;mly=e.clientY;ma.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(!mdrag)return;tx+=e.clientX-mlx;ty+=e.clientY-mly;mlx=e.clientX;mly=e.clientY;applyT();});
window.addEventListener('mouseup',()=>{mdrag=false;ma.style.cursor='';saveStateNow();});
ma.addEventListener('wheel',e=>{e.preventDefault();const r=ma.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.15:.87,ns=Math.max(.05,Math.min(sc*f,6));tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;applyT();saveState();},{passive:false});

// 바깥 클릭 시 검색창 닫기
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')&&!e.target.closest('#sr'))
    document.getElementById('sr').classList.remove('show');
});

buildMap();
const hasSavedState=restoreState();
renderList();
renderWish();
updateBadge();
// 저장된 상태가 없을 때만 시트 초기 상태를 완전히 숨김
if(!hasSavedState)collapseSheet();
else updateFabBottom();
window.addEventListener('resize',()=>{resetView();updateFabBottom();saveState();});
</script>
